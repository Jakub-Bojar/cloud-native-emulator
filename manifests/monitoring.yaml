# ============================================================================
# Prometheus + Grafana glue
# ============================================================================
# Two ways to scrape the worker pods:
#
# 1. Stock Prometheus (kube-prometheus-stack, bitnami chart, etc.):
#    every worker pod is annotated with prometheus.io/scrape=true in the
#    worker-template blueprint — most default configs pick that up
#    automatically.
#
# 2. Prometheus Operator: apply the PodMonitor below.
#
#    `worker-templates` matches every pod created by the controller's
#    template materialiser (label app.kubernetes.io/managed-by=emulator-controller).
#    The materialiser also stamps `template=<name>` and `role=<name>` onto
#    each pod, so once scraping is working you can group / filter in
#    Grafana by those labels via the `pod` series label.
# ============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: worker-templates
  labels:
    # match whatever podMonitorSelector your Prometheus CR uses;
    # kube-prometheus-stack defaults to release: <helm-release-name>
    release: kps
spec:
  # Copy the pods' `template` and `role` labels (stamped by the materialiser)
  # onto every scraped metric. This makes `role`/`template` first-class metric
  # labels, so dashboards can group by role — e.g. show one target line per
  # role instead of one identical line per pod:
  #   max by (role) (worker_target_cpu_millicores{...})
  podTargetLabels:
    - template
    - role
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: emulator-controller
  podMetricsEndpoints:
    # Templated pods name their HTTP port `http` (see worker-template.yaml).
    # Using the port name instead of targetPort means this PodMonitor stays
    # correct even if the port number changes later.
    - port: http
      path: /metrics
      interval: 5s
---
# The controller exposes emulator_configured_one_way_ms on /metrics — the
# template's configured inter-tier ONE-WAY latency, so dashboards can show
# "what the latency is meant to be" next to the workers' measured one-way
# value (worker_peer_rtt_ms / 2).
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: emulator-controller
  labels:
    release: kps
spec:
  selector:
    matchLabels:
      app: controller
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 15s
