# ============================================================================
# Worker pod + service + config
# ============================================================================
# The worker emulates resource usage (CPU / RAM / network) based on coefficients
# it receives. Instead of being pushed at over HTTP, it reads its desired
# behaviour from a JSON file projected into the pod from the `worker-config`
# ConfigMap. The worker uses `watchdog` to react to file changes, so editing
# the ConfigMap re-configures the emulation.
#
# resources.limits enforce the *Kubernetes-level* caps that the project
# objectives mention ("CPU caps and resource quotas to emulate heterogeneous
# devices"). The worker also self-imposes usage via its linear functions —
# the two layers compose naturally.
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-config
data:
  # Default: zero load. Edit this (via kubectl edit / the controller) to drive
  # the worker. The worker's startup applies this as soon as the pod boots.
  config.json: |
    {
      "x": 0,
      "cpu": { "a": 0, "b": 0 },
      "ram": { "a": 0, "b": 0 },
      "net": { "a": 0, "b": 0 }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: worker
  labels:
    app: worker
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  containers:
    - name: worker
      image: jp36/emulator-worker:latest
      imagePullPolicy: Always           # pull from Docker Hub
      ports:
        - containerPort: 8080
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "2000m"                  # 2 cores max — emulates "edge node"
          memory: "1Gi"
      readinessProbe:
        httpGet: { path: /healthz, port: 8080 }
        periodSeconds: 2
      volumeMounts:
        - name: config
          mountPath: /etc/emulator
          readOnly: true
  volumes:
    - name: config
      configMap:
        name: worker-config
---
apiVersion: v1
kind: Service
metadata:
  name: worker-service
spec:
  selector:
    app: worker
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
