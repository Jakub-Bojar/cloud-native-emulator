# ============================================================================
# Controller pod + service
# ============================================================================
# The controller is the public entry point. Exposed as NodePort here so you
# can hit it from your laptop while developing; switch to ClusterIP/Ingress
# in production.
# ============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: controller
  labels:
    app: controller
spec:
  containers:
    - name: controller
      image: jp36/emulator-controller:latest
      imagePullPolicy: Always
      ports:
        - containerPort: 8081
      env:
        - name: WORKER_URL
          value: "http://worker-service:8080"
      readinessProbe:
        httpGet: { path: /healthz, port: 8081 }
        periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: controller-service
spec:
  selector:
    app: controller
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
  type: NodePort