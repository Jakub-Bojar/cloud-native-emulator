# ============================================================================
# Controller pod + service + RBAC
# ============================================================================
# The controller is the public entry point. Exposed as NodePort here so you
# can hit it from your laptop while developing; switch to ClusterIP/Ingress
# in production.
#
# The controller does two things that require Kubernetes API access:
#
#   1. The legacy /configure flow patches the static `worker-config`
#      ConfigMap (consumed by manifests/worker.yaml).
#   2. The template materializer (controller/materializer.py) creates,
#      updates, and deletes ConfigMaps, Deployments, and Services to
#      stand up the topologies posted to /templates or declared via
#      labelled template ConfigMaps.
#
# The Role below grants both. It's namespace-scoped (not cluster-wide)
# and intentionally NOT bound to specific resource names — the
# materializer makes up names at runtime. The materializer label-scopes
# its own deletes via `labelSelector` so it can only ever touch
# resources it created.
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: controller-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: controller-emulator
rules:
  # ConfigMaps: legacy worker-config patches + materialized role configs +
  # watching labelled template ConfigMaps (Step 6).
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Services fronting each role.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Endpoints — read-only. The materializer reads these to enumerate
  # concrete backend pod IPs and write them into source-role ConfigMaps,
  # so iperf3 clients can hit specific pods rather than the Service
  # (avoiding the TCP-stickiness fan-out problem).
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list"]
  # Pods — read-only. The /api/v1 status + overview endpoints read live pod
  # state (phase, readiness, restart count, node, age) to fuse with the
  # scraped worker metrics.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # The Deployment per role.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: controller-emulator
subjects:
  - kind: ServiceAccount
    name: controller-sa
roleRef:
  kind: Role
  name: controller-emulator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: controller
  labels:
    app: controller
spec:
  serviceAccountName: controller-sa
  containers:
    - name: controller
      image: jp36/emulator-controller:latest
      imagePullPolicy: Always
      ports:
        - containerPort: 8081
      env:
        - name: WORKER_URL
          value: "http://worker-service:8080"
        - name: CONFIGMAP_NAME
          value: "worker-config"
        # Site identity — this controller's place in the larger cloud system.
        # Every /api/v1 response carries {id, tier} so a future federation
        # gateway can merge data across VMs. Set per VM (edge / fog / cloud).
        - name: SITE_ID
          value: "local"
        - name: SITE_TIER
          value: "unknown"
        # Prometheus HTTP API base URL for time-series (/api/v1/.../metrics).
        # Depends on your kube-prometheus-stack release/namespace — adjust to
        # match. If unreachable, metrics endpoints degrade gracefully.
        - name: PROM_URL
          value: "http://kps-kube-prometheus-stack-prometheus.monitoring.svc:9090"
      readinessProbe:
        httpGet: { path: /healthz, port: 8081 }
        periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: controller-service
spec:
  selector:
    app: controller
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
  type: NodePort
