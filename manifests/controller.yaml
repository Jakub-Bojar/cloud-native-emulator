# ============================================================================
# Controller pod + service + RBAC
# ============================================================================
# The controller is the public entry point. Exposed as NodePort here so you
# can hit it from your laptop while developing; switch to ClusterIP/Ingress
# in production.
#
# The controller needs Kubernetes API access for the template materialiser
# (controller/materialiser.py), which creates, updates, and deletes
# ConfigMaps, Deployments, and Services to stand up the topologies posted to
# /templates or declared via labelled template ConfigMaps.
#
# The Role below grants that. It's namespace-scoped (not cluster-wide)
# and intentionally NOT bound to specific resource names — the
# materialiser makes up names at runtime. The materialiser label-scopes
# its own deletes via `labelSelector` so it can only ever touch
# resources it created.
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: controller-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: controller-emulator
rules:
  # ConfigMaps: materialised per-role configs + watching labelled template
  # ConfigMaps for declarative ingestion.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
  # Services fronting each role.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete", "deletecollection"]
  # Endpoints — read-only. The materialiser reads these to enumerate
  # concrete backend pod IPs and write them into source-role ConfigMaps,
  # so iperf3 clients can hit specific pods rather than the Service
  # (avoiding the TCP-stickiness fan-out problem).
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list"]
  # Pods — read-only. The /api/v1 status + overview endpoints read live pod
  # state (phase, readiness, restart count, node, age) to fuse with the
  # scraped worker metrics.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # The Deployment per role.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch", "delete", "deletecollection"]
  # Chaos Mesh latency injection. materialise() refreshes NetworkChaos after
  # creating pods so the latency covers them — via the pause/resume
  # annotation (see controller/chaos.py). Chaos Mesh's own admission webhook
  # (vauth) gates RESUMING an experiment on the requester holding broad
  # chaos-mesh.org permissions in the target namespace — a single-resource
  # grant is rejected with "forbidden on namespace", hence resources: ["*"].
  # Namespace-scoped, and harmless if Chaos Mesh isn't installed.
  - apiGroups: ["chaos-mesh.org"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: controller-emulator
subjects:
  - kind: ServiceAccount
    name: controller-sa
roleRef:
  kind: Role
  name: controller-emulator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  labels:
    app: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controller
  template:
    metadata:
      labels:
        app: controller
    spec:
      serviceAccountName: controller-sa
      # Run on the control-plane node (microk8s-vm). It carries the
      # `dedicated=control-plane` taint to keep tier workloads off, so the
      # controller needs a matching toleration plus a hostname nodeSelector
      # to pin it there. Keeping the controller beside the API server keeps
      # the emulated tiers (cloud/fog/edge) free of control logic.
      nodeSelector:
        kubernetes.io/hostname: microk8s-vm
      tolerations:
        - key: dedicated
          operator: Equal
          value: control-plane
          effect: NoSchedule
      containers:
        - name: controller
          image: jp36/emulator-controller:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            # Site identity — this controller's place in the larger cloud system.
            # Every observability response carries {id, tier} so a future
            # federation gateway can merge data across VMs. Set per VM.
            - name: SITE_ID
              value: "local"
            - name: SITE_TIER
              value: "cloud"
            # Local timezone for /measurements/range: naive request timestamps
            # are interpreted in it and response timestamps rendered in it
            # (with offset). Also localises log timestamps.
            - name: TZ
              value: "Europe/London"
            # Prometheus HTTP API base URL for the windowed /summary endpoint.
            # Depends on your kube-prometheus-stack release/namespace — adjust to
            # match. If unreachable, /summary degrades gracefully.
            - name: PROM_URL
              value: "http://kps-kube-prometheus-stack-prometheus.monitoring.svc:9090"
          # TCP check rather than HTTP: /health was merged into GET /overview,
          # which does k8s API + Prometheus work — too heavy to hit every probe
          # period. Accepting a TCP connection proves the web layer is up.
          readinessProbe:
            tcpSocket: { port: 8081 }
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: controller-service
spec:
  selector:
    app: controller
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
  type: NodePort
