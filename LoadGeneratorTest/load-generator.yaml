apiVersion: v1
kind: Pod
metadata:
  name: robust-load-generator
spec:
  containers:
  - name: load-generator
    image: jp36/synthload:latest # (Replace with wherever you push the image)
    env:
    - name: CPU_TARGET_PCT
      value: "30"
    - name: RAM_TARGET_MB
      value: "256"
    - name: NET_TARGET_MBPS
      value: "10"
    - name: NET_TARGET_HOST
      value: "10.0.0.55" # The IP of your target server
    resources:
      requests:
        cpu: "1"
        memory: "512Mi"
      limits:
        cpu: "2"      # stress-ng will now accurately pull 30% across BOTH cores
        memory: "512Mi"