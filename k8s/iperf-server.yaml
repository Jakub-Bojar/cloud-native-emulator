apiVersion: v1
kind: Pod
metadata:
  name: iperf-server
  labels:
    app: iperf-server
spec:
  containers:
    - name: iperf3
      image: networkstatic/iperf3:latest
      args: ["-s"]
      ports:
        - containerPort: 5201
          protocol: TCP
        - containerPort: 5201
          protocol: UDP
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: iperf-server
spec:
  selector:
    app: iperf-server
  ports:
    - name: tcp
      protocol: TCP
      port: 5201
      targetPort: 5201
    - name: udp
      protocol: UDP
      port: 5201
      targetPort: 5201
